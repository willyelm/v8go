name: Leak Check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Checkout
        uses: actions/checkout@v4
      - name: Go Test
        env:
          CC: clang
          CXX: clang++
        run: |
          go test -c --tags leakcheck
          ./v8go.test
